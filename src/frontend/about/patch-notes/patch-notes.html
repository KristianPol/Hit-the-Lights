<div class="patch-notes-page">
  <div class="hero-section">
    <div class="hero-glow"></div>
    <h1 class="hero-title">Patch <span class="highlight">Notes</span></h1>
    <p class="hero-subtitle">Recent updates and changes</p>
    <div class="hero-divider">
      <span class="divider-bar"></span>
      <i class="fas fa-bolt divider-icon"></i>
      <span class="divider-bar"></span>
    </div>
  </div>

  <div class="patch-notes-content">
    <div class="version-card">
      <div class="version-header">
        <span class="version-badge">v1.1.1</span>
        <span class="version-date">Latest</span>
      </div>
      <ul class="change-list">
        <li><i class="fas fa-bomb"></i> Added bomb note type</li>
        <li><i class="fas fa-file-code"></i> Updated the structure of charting JSON files</li>
        <li><i class="fas fa-bolt"></i> Added SP points and a global leaderboard for them</li>
      </ul>
    </div>
  </div>

  <div class="back-row">
    <a class="back-button" [routerLink]="['/about']">
      <i class="fas fa-arrow-left"></i>
      <span>Back to About</span>
    </a>
  </div>
</div>
