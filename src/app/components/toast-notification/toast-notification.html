<div class="toast-container">
  @for (toast of toasts(); track toast.id) {
    <div
      class="toast toast-{{ toast.type }}"
      [class.clickable]="toast.senderId"
      (click)="toast.senderId && onToastClick(toast)"
      @toastAnimation
    >
      <div class="toast-icon">
        <i class="fas {{ getIconClass(toast.type) }}"></i>
      </div>
      <div class="toast-content">
        <div class="toast-title">{{ toast.title }}</div>
        <div class="toast-message">{{ toast.message }}</div>
        @if (toast.senderId) {
          <div class="toast-hint">Click to open chat</div>
        }
      </div>
      <button class="toast-close" (click)="$event.stopPropagation(); dismiss(toast.id)" aria-label="Dismiss">
        <i class="fas fa-xmark"></i>
      </button>
      <div class="toast-progress"></div>
    </div>
  }
</div>
